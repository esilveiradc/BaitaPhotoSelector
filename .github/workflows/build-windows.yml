- name: Find main Python file
  shell: pwsh
  run: |
    Get-ChildItem -Recurse -Filter "*.py"

    $script = Get-ChildItem -Recurse -Filter "*.py" |
      Where-Object { $_.Name -notlike "test_*" -and $_.FullName -notlike "*\.venv\*" } |
      Select-Object -First 1

    if (-not $script) {
      Write-Error "Nenhum arquivo .py encontrado no projeto."
      exit 1
    }

    echo "MAIN_SCRIPT=$($script.FullName)" >> $env:GITHUB_ENV
    echo "Arquivo principal encontrado: $($script.FullName)"

- name: Build executable
  shell: pwsh
  run: |
    pyinstaller --onefile --windowed --name "Baita Photo Selector Pro v0.1-alpha" "$env:MAIN_SCRIPT"
