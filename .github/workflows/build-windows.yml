name: Baita-Photo-Selector-Windows-v0.1-alpha

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "baita_photo_selector_pro_v0.1-alpha.py"
      - "requirements.txt"
      - ".github/workflows/build-windows.yml"
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --name "Baita Photo Selector Pro v0.1-alpha" baita_photo_selector_pro_v0.1-alpha.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Baita-Photo-Selector-Windows-v0.1-alpha
          path: "dist/Baita Photo Selector v0.1.exe"

      - name: Upload executable to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: "dist/Baita Photo Selector v0.1.exe.exe"
